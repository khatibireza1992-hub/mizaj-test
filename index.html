<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست مزاج و لاغری - اندام برتر</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {font-family: Tahoma, sans-serif; background: #e8f5e9; margin:0; padding:15px;}
        .container {max-width: 850px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden;}
        h1 {text-align:center; background:#1d5c3f; color:white; padding:25px; margin:0;}
        .section {padding:20px;}
        input {width:100%; padding:14px; margin:8px 0; border:2px solid #4caf50; border-radius:10px; font-size:17px;}
        .question {background:#f1f8f3; padding:18px; margin:12px 0; border-radius:12px; border:1px solid #81c784;}
        label {display:block; padding:12px; margin:8px 0; background:white; border-radius:8px; cursor:pointer;}
        button {width:90%; margin:25px auto; display:block; padding:18px; background:#1d5c3f; color:white; border:none; border-radius:12px; font-size:19px;}
        .result {display:none; padding:25px;}
        a {display:block; margin:25px auto; padding:16px; background:#1d5c3f; color:white; text-decoration:none; border-radius:12px; font-size:18px;}
    </style>
</head>
<body>
<div class="container">
    <h1>🧬 تست جامع مزاج و لاغری</h1>
    
    <div class="section">
        <p><strong>نام و نام خانوادگی:</strong></p>
        <input type="text" id="name" placeholder="نام خود را وارد کنید">
        
        <p><strong>سن:</strong></p>
        <input type="number" id="age" placeholder="سن خود را وارد کنید">
    </div>

    <div id="questions" class="section"></div>

    <button onclick="showResult()">مشاهده نتیجه تست</button>

    <div id="result" class="result">
        <h2 style="text-align:center;color:#1d5c3f;">گزارش مزاج و لاغری شما</h2>
        <div id="report"></div>
        <canvas id="mizajChart" style="margin:25px auto; max-height:350px;"></canvas>
        <a href="https://rubika.ir/andam_barat_1" target="_blank">📲 مشاوره با @andam_barat_1</a>
    </div>
</div>

<script>
const questions = [
    {q: "دمای دست و پای شما معمولاً چگونه است؟", opt: ["سرد", "متعادل", "گرم"]},
    {q: "تحمل شما در برابر سرما چقدر است؟", opt: ["بالا", "متوسط", "پایین"]},
    {q: "تحمل شما در برابر گرما چقدر است؟", opt: ["پایین", "متوسط", "بالا"]},
    {q: "پوست شما چگونه است؟", opt: ["خشک", "متعادل", "چرب"]},
    {q: "رنگ چهره شما؟", opt: ["کم‌رنگ", "متوسط", "برافروخته"]},
    {q: "خواب شما؟", opt: ["زیاد", "متوسط", "کم"]},
    {q: "اشتها شما؟", opt: ["کم", "متوسط", "زیاد"]},
    {q: "هضم غذا؟", opt: ["کند", "متوسط", "سریع"]},
    {q: "انرژی روزانه؟", opt: ["کم", "متوسط", "بالا"]},
    {q: "خلق و خو؟", opt: ["آرام", "متعادل", "فعال"]},
    // ۲۰ سوال دیگه بعدا اضافه می‌کنیم
];

const qBox = document.getElementById("questions");
questions.forEach((item, i) => {
    let html = `<div class="question"><p><strong>${i+1}. ${item.q}</strong></p>`;
    item.opt.forEach((opt, idx) => {
        html += `<label><input type="radio" name="q\( {i}" value=" \){idx}"> ${opt}</label>`;
    });
    html += `</div>`;
    qBox.innerHTML += html;
});

function showResult() {
    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value;

    if (!name || !age) return alert("نام و سن را وارد کنید");

    let score = 0;
    let answered = 0;

    for(let i = 0; i < questions.length; i++) {
        const ans = document.querySelector(`input[name="q${i}"]:checked`);
        if (ans) {
            score += parseInt(ans.value);
            answered++;
        }
    }

    const percent = answered > 0 ? Math.round((score / (answered * 2)) * 100) : 0;

    let mizaj = percent > 60 ? "گرم" : percent > 35 ? "متعادل" : "سرد";

    document.getElementById("report").innerHTML = `
        <p><strong>نام:</strong> ${name}</p>
        <p><strong>سن:</strong> ${age} سال</p>
        <p><strong>مزاج غالب:</strong> ${mizaj}</p>
        <p><strong>امتیاز:</strong> ${percent}%</p>
    `;

    // نمودار
    const ctx = document.getElementById("mizajChart");
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['سرد', 'متعادل', 'گرم'],
            datasets: [{ data: [100-percent, 30, percent], backgroundColor: ['#42a5f5', '#66bb6a', '#ff9800'] }]
        }
    });

    document.getElementById("result").style.display = "block";
}
</script>
</body>
</html>
