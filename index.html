<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تست جامع مزاج - اندام برتر</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Tahoma, sans-serif;
    background: #0d1b2a;
    min-height: 100vh;
    padding: 20px 15px 40px;
    color: #333;
  }

  .container {
    max-width: 720px;
    margin: auto;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 40px 20px 30px;
    color: white;
  }
  .hero-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #a8d5ba;
    margin-bottom: 8px;
  }
  .hero p {
    font-size: 14px;
    color: #7a9bb0;
    line-height: 1.8;
  }

  /* PROGRESS */
  .progress-wrap {
    background: #1a2e3f;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: #0d1b2a;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2e7d32, #a8d5ba);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 13px;
    color: #a8d5ba;
    white-space: nowrap;
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    margin-bottom: 16px;
  }

  .card-header {
    background: linear-gradient(135deg, #1b4332, #2d6a4f);
    padding: 20px 24px;
  }
  .card-header h2 {
    color: #a8d5ba;
    font-size: 16px;
    font-weight: normal;
    margin-bottom: 4px;
  }
  .card-header p {
    color: #d8f3dc;
    font-size: 13px;
    opacity: 0.8;
  }

  .card-body { padding: 24px; }

  /* INPUTS */
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: #555;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .input-group input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    font-family: Tahoma, sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .input-group input:focus {
    border-color: #2d6a4f;
  }

  /* QUESTIONS */
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    border-right: 4px solid #2d6a4f;
  }
  .question-num {
    font-size: 11px;
    color: #2d6a4f;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .question-text {
    font-size: 15px;
    color: #1a1a1a;
    font-weight: bold;
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 2px solid #e8f5e9;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    transition: all 0.2s;
    background: #fafafa;
  }
  .option-label:hover {
    border-color: #2d6a4f;
    background: #f0faf2;
  }
  .option-label input[type="radio"] { display: none; }
  .option-label.selected {
    border-color: #2d6a4f;
    background: #e8f5e9;
    color: #1b4332;
    font-weight: bold;
  }
  .option-dot {
    width: 18px;
    height: 18px;
    border: 2px solid #ccc;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-label.selected .option-dot {
    border-color: #2d6a4f;
    background: #2d6a4f;
    box-shadow: inset 0 0 0 3px white;
  }

  /* BUTTON */
  .btn-main {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, #1b4332, #2d6a4f);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: bold;
    font-family: Tahoma, sans-serif;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 1px;
  }
  .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-main:active { transform: translateY(0); }

  /* RESULT */
  #result { display: none; }

  .result-hero {
    background: linear-gradient(135deg, #1b4332, #2d6a4f);
    border-radius: 18px;
    padding: 32px 24px;
    text-align: center;
    color: white;
    margin-bottom: 16px;
  }
  .result-hero .name-tag {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .result-hero .mizaj-name {
    font-size: 28px;
    font-weight: bold;
    color: #a8d5ba;
    margin-bottom: 8px;
  }
  .result-hero .mizaj-pct {
    font-size: 15px;
    opacity: 0.8;
  }
  .result-hero .mizaj-icon { font-size: 48px; margin-bottom: 12px; }

  .scores-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .score-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .score-card .sc-icon { font-size: 24px; margin-bottom: 6px; }
  .score-card .sc-name { font-size: 13px; color: #666; margin-bottom: 4px; }
  .score-card .sc-pct { font-size: 22px; font-weight: bold; }
  .score-card.dominant { border: 2px solid #2d6a4f; }
  .score-card.dominant .sc-pct { color: #2d6a4f; }

  .info-card {
    background: white;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .info-card h3 {
    color: #1b4332;
    font-size: 16px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid #e8f5e9;
  }
  .info-card p, .info-card li {
    font-size: 14px;
    color: #444;
    line-height: 2;
  }
  .info-card ul { padding-right: 18px; }

  .chart-card {
    background: white;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    text-align: center;
  }
  .chart-card h3 {
    color: #1b4332;
    font-size: 16px;
    margin-bottom: 16px;
  }
  canvas { max-width: 280px; max-height: 280px; margin: auto; display: block; }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #1b4332, #2d6a4f);
    color: white;
    text-decoration: none;
    border-radius: 14px;
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 16px;
  }

  .error-msg {
    background: #fff3f3;
    border: 1px solid #f5c6cb;
    color: #c0392b;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
</style>
</head>

<div class="container">

  <div class="hero">
    <span class="hero-icon">🧬</span>
    <h1>تست جامع مزاج طب سنتی</h1>

      </div>

        <label>سن</label>

  </div>

  <!-- نوار پیشرفت -->
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-label" id="progressLabel">۰ از ۳۰</span>
  </div>

  <!-- سوالات -->

  <div class="error-msg" id="errorMsg">⚠️ لطفاً به تمام سوالات پاسخ دهید</div>

  <button class="btn-main" onclick="showResult()">مشاهده نتیجه تست ←</button>

  <div id="result">

const wrap = document.getElementById("questionsWrap");
questions.forEach((item, i) => {
  let html = `<div class="question-card">
    <div class="question-num">سوال ${i+1} از ۳۰</div>
    <div class="question-text">${item.q}</div>
    <div class="options">`;
  item.opt.forEach((opt, j) => {
    html += `<label class="option-label" id="lbl_${i}_${j}" onclick="selectOption(${i},${j})">
      <input type="radio" name="q${i}" value="${j}">
      <span class="option-dot"></span>
      ${opt}
    </label>`;
  });
  html += `</div></div>`;
  wrap.innerHTML += html;
});

function selectOption(qi, vi) {
  for(let j=0; j<3; j++) {
    const lbl = document.getElementById(`lbl_${qi}_${j}`);
    if(lbl) lbl.classList.remove('selected');
  }
  const sel = document.getElementById(`lbl_${qi}_${vi}`);
  if(sel) sel.classList.add('selected');
  updateProgress();
}

function updateProgress() {
  let answered = 0;
  for(let i=0; i<30; i++) {
    if(document.querySelector(`input[name="q${i}"]:checked`)) answered++;
  }
  const pct = Math.round((answered/30)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = answered + ' از ۳۰';
}
