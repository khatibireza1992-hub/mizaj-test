<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تست جامع سلامت، مزاج و متابولیسم بدن</title>
<style>
body{font-family:tahoma;background:#f4f6f5;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px}
.question{border:1px solid #ddd;padding:12px;margin:12px 0;border-radius:10px}
button{width:100%;padding:15px;background:#1d5c3f;color:#fff;border:none;border-radius:10px}
.result{display:none;margin-top:20px;padding:15px;background:#eef8f0;border-radius:10px}
input[type=text],input[type=number]{width:100%;padding:10px}
</style>
</head>
<body>
<div class="container">
<h1>تست جامع سلامت، مزاج و متابولیسم بدن</h1>

<p>نام:</p><input type="text" id="name">
<p>سن:</p><input type="number" id="age">

<div id="questions"></div>

<button onclick="showResult()">مشاهده نتیجه</button>

<div id="result" class="result">
<h2>گزارش سلامت شما</h2>
<div id="report"></div>
<p><a href="https://rubika.ir/andam_bartar_1">ارتباط با مشاور</a></p>
</div>
</div>

<script>
const questions=[
"دمای دست و پا","تحمل سرما","تحمل گرما","وضعیت پوست","رنگ چهره",
"تشنگی","سرعت صحبت","سطح انرژی","اشتها","کیفیت خواب",
"استرس","نفخ","یبوست","تعریق","تمرکز",
"حافظه","فعالیت بدنی","میل به شیرینی","میل به غذاهای گرم","میل به غذاهای سرد",
"خستگی صبحگاهی","خواب روز","بی قراری","ضربان هیجانی","تحمل گرسنگی",
"سرعت متابولیسم","احساس سنگینی بدن","انگیزه روزانه","وضعیت گوارش","خلق و خو"
];

const box=document.getElementById("questions");

questions.forEach((q,i)=>{
box.innerHTML+=`
<div class="question">
<p>${i+1}- ${q}</p>
<label><input type="radio" name="q${i}" value="1"> گزینه اول</label><br><br>
<label><input type="radio" name="q${i}" value="2"> گزینه دوم</label><br><br>
<label><input type="radio" name="q${i}" value="3"> گزینه سوم</label>
</div>`;
});

function showResult(){

let balghami = 0;
let sodavi = 0;
let damavi = 0;
let safravi = 0;
for(let i=0;i<30;i++){

let answer=document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(!answer){
continue;
}

let value=parseInt(answer.value);

if(value===1){

balghami+=2;
sodavi+=1;

}

if(value===2){

damavi+=2;

}

if(value===3){

safravi+=2;
damavi+=1;

}

}
let total=balghami+sodavi+damavi+safravi;

alert(
"بلغمی="+balghami+
" سوداوی="+sodavi+
" دموی="+damavi+
" صفراوی="+safravi+
" مجموع="+total
);

balghami=Math.round(balghami/total*100);
sodavi=Math.round(sodavi/total*100);
damavi=Math.round(damavi/total*100);
safravi=100-balghami-sodavi-damavi;

document.getElementById("result").style.display="block";
let digestive = Math.min(100, Math.round((damavi*0.4)+(balghami*0.6)));
let sleep = Math.min(100, Math.round((balghami*0.7)+(sodavi*0.3)));
let metabolism = Math.min(100, Math.round((safravi*0.7)+(damavi*0.3)));
let stress = Math.min(100, Math.round((safravi*0.6)+(sodavi*0.4)));
document.getElementById("report").innerHTML=`
<p>نام: ${document.getElementById("name").value}</p>
<p>بلغمی: ${balghami}%</p>
<p>سوداوی: ${sodavi}%</p>
<p>دموی: ${damavi}%</p>
<p>صفراوی: ${safravi}%</p>
<p>گوارش: ${digestive} از 100</p>
<p>خواب: ${sleep} از 100</p>
<p>متابولیسم: ${metabolism} از 100</p>
<p>استرس: ${stress} از 100</p>
}
</script>
</body>
</html>
