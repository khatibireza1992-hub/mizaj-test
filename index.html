<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تست جامع سلامت، مزاج و متابولیسم بدن</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{
font-family:tahoma;
background:#f4f6f5;
padding:20px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.08);
}

h1,h2{
text-align:center;
color:#1d5c3f;
}

.question{
border:1px solid #ddd;
padding:12px;
margin:12px 0;
border-radius:10px;
background:#fafafa;
}

button{
width:100%;
padding:15px;
background:#1d5c3f;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result{
display:none;
margin-top:20px;
padding:20px;
background:#eef8f0;
border-radius:10px;
}

input[type=text],
input[type=number]{
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
border:1px solid #ccc;
border-radius:8px;
}

.report-item{
margin:10px 0;
font-size:18px;
}

a{
display:inline-block;
margin-top:15px;
text-decoration:none;
background:#1d5c3f;
color:white;
padding:10px 15px;
border-radius:8px;
}
</style></head><body><div class="container"><h1>تست جامع سلامت، مزاج و متابولیسم بدن</h1><p>نام:</p>
<input type="text" id="name"><p>سن:</p>
<input type="number" id="age"><div id="questions"></div><button onclick="showResult()">مشاهده نتیجه</button>

<div id="result" class="result"><h2>گزارش سلامت شما</h2><div id="report"></div><canvas id="mizajChart" style="margin-top:25px;"></canvas>

<a href="https://rubika.ir/andam_bartar_1">
ارتباط با مشاور
</a></div></div><script>

const questions=[
"دمای دست و پای شما معمولاً چگونه است؟",
"تحمل شما در برابر سرما چگونه است؟",
"تحمل شما در برابر گرما چگونه است؟",
"رطوبت پوست شما چگونه است؟",
"رنگ چهره شما چگونه است؟",
"میزان تشنگی شما چگونه است؟",
"سرعت صحبت کردن شما چگونه است؟",
"سطح انرژی روزانه شما چگونه است؟",
"اشتها چگونه است؟",
"کیفیت خواب شما چگونه است؟",
"میزان استرس روزانه شما چگونه است؟",
"میزان نفخ معده چگونه است؟",
"وضعیت یبوست چگونه است؟",
"میزان تعریق بدن چگونه است؟",
"قدرت تمرکز شما چگونه است؟",
"حافظه شما چگونه است؟",
"میزان فعالیت بدنی شما چگونه است؟",
"میزان علاقه به شیرینی چگونه است؟",
"میزان علاقه به غذاهای گرم چگونه است؟",
"میزان علاقه به غذاهای سرد چگونه است؟",
"خستگی صبحگاهی شما چگونه است؟",
"تمایل به خواب روزانه چگونه است؟",
"میزان بی‌قراری چگونه است؟",
"شدت هیجانات و واکنش‌های احساسی چگونه است؟",
"تحمل گرسنگی چگونه است؟",
"سرعت متابولیسم بدن چگونه است؟",
"احساس سنگینی بدن چگونه است؟",
"انگیزه روزانه شما چگونه است؟",
"وضعیت کلی گوارش چگونه است؟",
"خلق و خوی کلی شما چگونه است؟"
];




const box=document.getElementById("questions");

questions.forEach((q,i)=>{

let option1="کم / ضعیف / سرد";
let option2="متوسط / متعادل";
let option3="زیاد / قوی / گرم";

if(i===0){
option1="اغلب سرد است";
option2="متعادل است";
option3="اغلب گرم است";
}

if(i===1){
option1="خیلی کم";
option2="متوسط";
option3="زیاد";
}

if(i===2){
option1="زیاد";
option2="متوسط";
option3="کم";
}

if(i===3){
option1="مرطوب";
option2="متعادل";
option3="خشک";
}

if(i===4){
option1="روشن";
option2="گندمی";
option3="تیره";
}

if(i===5){
option1="کم";
option2="متوسط";
option3="زیاد";
}

if(i===6){
option1="آرام";
option2="معمولی";
option3="سریع";
}

if(i===7){
option1="کم";
option2="متوسط";
option3="زیاد";
}

if(i===8){
option1="کم";
option2="متوسط";
option3="زیاد";
}

if(i===9){
option1="خواب سنگین";
option2="متعادل";
option3="خواب سبک";
}
  
box.innerHTML+=`

<div class="question">

<p>${i+1}- ${q}</p>

<label>
<input type="radio" name="q${i}" value="1">
${option1}
</label>

<br><br>

<label>
<input type="radio" name="q${i}" value="2">
${option2}
</label>

<br><br>

<label>
<input type="radio" name="q${i}" value="3">
${option3}
</label>

</div>

`;

});

function showResult(){

let balghami=0;
let sodavi=0;
let damavi=0;
let safravi=0;

for(let i=0;i<30;i++){

let answer=document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(!answer){
continue;
}

let value=parseInt(answer.value);

if(value===1){
balghami+=2;
sodavi+=1;
}

if(value===2){
damavi+=2;
}

if(value===3){
safravi+=2;
damavi+=1;
}

}

let total=
balghami+
sodavi+
damavi+
safravi;

if(total===0){

alert("لطفاً حداقل به یک سؤال پاسخ دهید");

return;
}

balghami=Math.round(balghami/total*100);
sodavi=Math.round(sodavi/total*100);
damavi=Math.round(damavi/total*100);
safravi=100-balghami-sodavi-damavi;

let digestive=
Math.min(100,
Math.round((damavi*0.4)+(balghami*0.6))
);

let sleep=
Math.min(100,
Math.round((balghami*0.7)+(sodavi*0.3))
);

let metabolism=
Math.min(100,
Math.round((safravi*0.7)+(damavi*0.3))
);

let stress=
Math.min(100,
Math.round((safravi*0.6)+(sodavi*0.4))
);

document.getElementById("result").style.display="block";

document.getElementById("report").innerHTML=`

<div class="report-item">
نام: ${document.getElementById("name").value}
</div>

<div class="report-item">
بلغمی: ${balghami}%
</div>

<div class="report-item">
سوداوی: ${sodavi}%
</div>

<div class="report-item">
دموی: ${damavi}%
</div>

<div class="report-item">
صفراوی: ${safravi}%
</div>

<hr>

<div class="report-item">
گوارش: ${digestive} از 100
</div>

<div class="report-item">
خواب: ${sleep} از 100
</div>

<div class="report-item">
متابولیسم: ${metabolism} از 100
</div>

<div class="report-item">
استرس: ${stress} از 100
</div>

`;

const ctx=document.getElementById('mizajChart');

if(window.mizajChartInstance){
window.mizajChartInstance.destroy();
}

window.mizajChartInstance=new Chart(ctx,{
type:'pie',
data:{
labels:[
'بلغمی',
'سوداوی',
'دموی',
'صفراوی'
],
datasets:[{
data:[
balghami,
sodavi,
damavi,
safravi
],
backgroundColor:[
'#4FC3F7',
'#616161',
'#EF5350',
'#FFCA28'
]
}]
},
options:{
responsive:true,
plugins:{
legend:{
position:'bottom'
}
}
}
});

}

</script></body>
</html>
