<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست مزاج و لاغری - اندام برتر</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Tahoma; background: #f0f7f0; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        h1 { text-align: center; background: #1d5c3f; color: white; padding: 20px; margin: 0; }
        .section { padding: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #1d5c3f; border-radius: 8px; font-size: 16px; }
        .question { background: #f8fff8; padding: 15px; margin: 12px 0; border-radius: 10px; border: 1px solid #81c784; }
        label { display: block; padding: 10px; margin: 6px 0; background: white; border-radius: 6px; }
        button { width: 90%; margin: 20px auto; padding: 15px; background: #1d5c3f; color: white; border: none; border-radius: 10px; font-size: 18px; }
        .result { display: none; padding: 20px; text-align: center; }
        a { display: block; margin: 20px auto; padding: 15px; background: #1d5c3f; color: white; text-decoration: none; border-radius: 10px; font-size: 17px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧬 تست مزاج و لاغری</h1>
    
    <div class="section">
        <p><strong>نام و نام خانوادگی:</strong></p>
        <input type="text" id="name" placeholder="نام خود را وارد کنید">
        
        <p><strong>سن:</strong></p>
        <input type="number" id="age" placeholder="سن خود را وارد کنید">
    </div>

    <div id="questions" class="section"></div>
    
    <button onclick="showResult()">مشاهده نتیجه تست</button>

    <div id="result" class="result">
        <h2>گزارش مزاج شما</h2>
        <div id="report"></div>
        <canvas id="mizajChart" width="300" height="300"></canvas>
        
        <a href="https://rubika.ir/andam_barat_1" target="_blank">📲 مشاوره با @andam_barat_1</a>
    </div>
</div>

<script>
// ۳۰ سوال
const questions = [
    {q: "دمای دست و پای شما معمولاً؟", opt: ["سرد", "متعادل", "گرم"]},
    {q: "تحمل شما در برابر سرما؟", opt: ["بالا", "متوسط", "پایین"]},
    {q: "تحمل شما در برابر گرما؟", opt: ["پایین", "متوسط", "بالا"]},
    // ... (برای کوتاه شدن پیام، بقیه سوالات رو بعداً کامل می‌کنم)
];

const box = document.getElementById("questions");
questions.forEach((item, i) => {
    let html = `<div class="question"><p><strong>${i+1}. ${item.q}</strong></p>`;
    item.opt.forEach((option, index) => {
        html += `<label><input type="radio" name="q\( {i}" value=" \){index}"> ${option}</label>`;
    });
    html += `</div>`;
    box.innerHTML += html;
});

function showResult() {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    if (!name || !age) return alert("نام و سن را وارد کنید");

    document.getElementById("result").style.display = "block";
    document.getElementById("report").innerHTML = `<p>نام: ${name}<br>سن: ${age}</p><p>نتیجه در حال محاسبه...</p>`;
}
</script>
</body>
</html>
