<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست مزاج - اندام برتر</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {font-family: Tahoma; background:#f0f7f0; margin:0; padding:10px;}
        .box {max-width:800px; margin:auto; background:white; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); padding:20px;}
        h1 {text-align:center; background:#1d5c3f; color:white; padding:20px; border-radius:15px 15px 0 0;}
        input {width:100%; padding:12px; margin:10px 0; border:2px solid #1d5c3f; border-radius:8px; font-size:16px;}
        .question {background:#f8fff8; padding:15px; margin:12px 0; border-radius:10px;}
        label {display:block; padding:10px; margin:5px 0; background:white; border-radius:6px;}
        button {width:100%; padding:18px; background:#1d5c3f; color:white; border:none; border-radius:10px; font-size:18px; margin:20px 0;}
        .result {display:none; margin-top:20px;}
    </style>
</head>
<body>
<div class="box">
    <h1>🧬 تست مزاج و لاغری</h1>

    <p><strong>نام:</strong></p>
    <input type="text" id="name" placeholder="نام و نام خانوادگی">

    <p><strong>سن:</strong></p>
    <input type="number" id="age" placeholder="سن شما">

    <div id="questions"></div>

    <button onclick="showResult()">مشاهده نتیجه تست</button>

    <div id="result" class="result">
        <h2 style="text-align:center;">گزارش مزاج شما</h2>
        <div id="report"></div>
        <canvas id="mizajChart" style="margin:20px auto;"></canvas>
        
        <a href="https://rubika.ir/andam_barat_1" target="_blank" style="display:block; text-align:center; padding:15px; background:#1d5c3f; color:white; text-decoration:none; border-radius:10px;">
            مشاوره با @andam_barat_1
        </a>
    </div>
</div>

<script>
const questions = [
    {q: "دمای دست و پای شما معمولاً؟", opt: ["سرد", "متعادل", "گرم"]},
    {q: "تحمل شما در برابر سرما؟", opt: ["بالا", "متوسط", "پایین"]},
    {q: "تحمل شما در برابر گرما؟", opt: ["پایین", "متوسط", "بالا"]},
    {q: "پوست شما چگونه است؟", opt: ["خشک", "متعادل", "چرب"]},
    {q: "رنگ چهره شما؟", opt: ["کم‌رنگ", "متوسط", "برافروخته"]},
    {q: "خواب شما؟", opt: ["زیاد", "متوسط", "کم"]},
    {q: "اشتها شما؟", opt: ["کم", "متوسط", "زیاد"]},
    {q: "هضم غذا؟", opt: ["کند", "متوسط", "سریع"]},
    {q: "انرژی روزانه؟", opt: ["کم", "متوسط", "بالا"]},
    {q: "خلق و خو؟", opt: ["آرام", "متعادل", "فعال"]},
];

const qBox = document.getElementById("questions");
questions.forEach((item, i) => {
    let html = `<div class="question"><p><strong>${i+1}. ${item.q}</strong></p>`;
    item.opt.forEach((opt, idx) => {
        html += `<label><input type="radio" name="q\( {i}" value=" \){idx}"> ${opt}</label>`;
    });
    html += `</div>`;
    qBox.innerHTML += html;
});

function showResult() {
    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value;

    if (!name || !age) {
        alert("نام و سن را وارد کنید");
        return;
    }

    // محاسبه ساده
    let score = 0;
    for(let i = 0; i < questions.length; i++) {
        const ans = document.querySelector(`input[name="q${i}"]:checked`);
        if (ans) score += parseInt(ans.value);
    }

    const percent = Math.round((score / (questions.length * 2)) * 100);

    document.getElementById("report").innerHTML = `
        <p><strong>نام:</strong> ${name}</p>
        <p><strong>سن:</strong> ${age} سال</p>
        <p><strong>مزاج غالب:</strong> ${percent > 60 ? "گرم" : percent > 40 ? "متعادل" : "سرد"}</p>
        <p>امتیاز: ${percent}%</p>
    `;

    document.getElementById("result").style.display = "block";
}
</script>
</body>
</html>
