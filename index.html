<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست مزاج و لاغری - اندام برتر</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #f0f4f0, #e8f5e8);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #1d5c3f;
            padding: 20px;
            margin: 0;
            background: #f8fff8;
        }
        .input-group {
            padding: 15px 20px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .question {
            padding: 18px;
            margin: 12px 20px;
            background: #f8fff8;
            border-radius: 15px;
            border: 1px solid #c8e6c8;
        }
        label {
            display: block;
            margin: 12px 0;
            font-size: 15.5px;
            cursor: pointer;
        }
        button {
            width: 90%;
            margin: 20px auto;
            display: block;
            padding: 16px;
            background: #1d5c3f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }
        .result {
            display: none;
            padding: 20px;
        }
        .report-item {
            font-size: 17px;
            margin: 12px 0;
            padding: 8px 0;
        }
        a {
            display: block;
            text-align: center;
            margin: 25px auto;
            padding: 14px;
            background: #1d5c3f;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>تست جامع مزاج و لاغری</h1>

    <div class="input-group">
        <p><strong>نام و نام خانوادگی:</strong></p>
        <input type="text" id="name" placeholder="نام خود را وارد کنید">
        
        <p><strong>سن:</strong></p>
        <input type="number" id="age" placeholder="سن خود را وارد کنید">
    </div>

    <div id="questions"></div>

    <button onclick="showResult()">مشاهده نتیجه تست</button>

    <div id="result" class="result">
        <h2 style="text-align:center; color:#1d5c3f;">گزارش سلامت و مزاج شما</h2>
        <div id="report"></div>
        <canvas id="mizajChart" style="margin:25px 0;"></canvas>
        
        <a href="https://rubika.ir/andam_barat_1" target="_blank">
            📲 ارتباط با مشاور اندام برتر (@andam_barat_1)
        </a>
    </div>
</div>

<script>
// سوالات بهبود یافته
const questions = [
    {q: "دمای دست و پای شما معمولاً:", opt: ["سرد", "متعادل", "گرم"]},
    {q: "تحمل شما در برابر سرما:", opt: ["بالا", "متوسط", "پایین"]},
    {q: "تحمل شما در برابر گرما:", opt: ["پایین", "متوسط", "بالا"]},
    {q: "رطوبت و چربی پوست صورت:", opt: ["خشک", "متعادل", "چرب"]},
    {q: "رنگ چهره شما:", opt: ["سفید و کم‌رنگ", "متوسط", "سرخ و برافروخته"]},
    // ... (می‌تونم بعداً سوالات بیشتری اضافه کنم)
];

const box = document.getElementById("questions");

questions.forEach((item, i) => {
    let html = `<div class="question"><p><strong>${i+1}. ${item.q}</strong></p>`;
    item.opt.forEach((option, index) => {
        html += `
            <label>
                <input type="radio" name="q\( {i}" value=" \){index+1}">
                ${option}
            </label><br>`;
    });
    html += `</div>`;
    box.innerHTML += html;
});

function showResult() {
    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value;

    if (!name || !age) {
        alert("لطفاً نام و سن خود را وارد کنید");
        return;
    }

    // محاسبه امتیاز (بهبود یافته)
    let balghami = 0, sodavi = 0, damavi = 0, safravi = 0;

    for(let i = 0; i < questions.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) continue;
        const val = parseInt(selected.value);

        if (val === 1) balghami += 3;
        else if (val === 2) { damavi += 1; sodavi += 1; }
        else if (val === 3) safravi += 3;
    }

    // محاسبه درصد
    const total = balghami + sodavi + damavi + safravi || 1;
    const percentages = {
        balghami: Math.round(balghami / total * 100),
        sodavi: Math.round(sodavi / total * 100),
        damavi: Math.round(damavi / total * 100),
        safravi: Math.round(safravi / total * 100)
    };

    // نمایش نتیجه
    document.getElementById("result").style.display = "block";
    document.getElementById("report").innerHTML = `
        <div class="report-item"><strong>نام:</strong> ${name}</div>
        <div class="report-item"><strong>سن:</strong> ${age} سال</div>
        <hr>
        <div class="report-item">بلغمی: ${percentages.balghami}%</div>
        <div class="report-item">سوداوی: ${percentages.sodavi}%</div>
        <div class="report-item">دموی: ${percentages.damavi}%</div>
        <div class="report-item">صفراوی: ${percentages.safravi}%</div>
    `;

    // نمودار
    const ctx = document.getElementById('mizajChart');
    if (window.mizajChartInstance) window.mizajChartInstance.destroy();
    
    window.mizajChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['بلغمی', 'سوداوی', 'دموی', 'صفراوی'],
            datasets: [{
                data: Object.values(percentages),
                backgroundColor: ['#4FC3F7', '#616161', '#EF5350', '#FFCA28']
            }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
}
</script>
</body>
</html>
